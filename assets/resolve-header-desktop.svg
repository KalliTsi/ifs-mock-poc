<svg width="1440" height="72" viewBox="0 0 1440 72" xmlns="http://www.w3.org/2000/svg">
  <!-- Background bar -->
  <rect width="1440" height="72" fill="#0A0A0A"/>

  <!-- Subtle bottom border -->
  <line x1="0" y1="71.5" x2="1440" y2="71.5" stroke="#1E1E1E" stroke-width="1"/>

  <!-- "Resolve" wordmark -->
  <text
    x="32"
    y="44"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="-0.4"
    fill="#FFFFFF"
  >Resolve</text>

  <!-- Nav items (desktop) -->
  <text x="180" y="44" font-family="'SF Pro Text', 'Inter', sans-serif" font-size="13" fill="#888888" letter-spacing="0.1">Faults</text>
  <text x="240" y="44" font-family="'SF Pro Text', 'Inter', sans-serif" font-size="13" fill="#888888" letter-spacing="0.1">Reports</text>
  <text x="310" y="44" font-family="'SF Pro Text', 'Inter', sans-serif" font-size="13" fill="#888888" letter-spacing="0.1">Fleet</text>
  <text x="360" y="44" font-family="'SF Pro Text', 'Inter', sans-serif" font-size="13" fill="#888888" letter-spacing="0.1">Analytics</text>

  <!-- Right side: Report Issue pill button -->
  <rect x="1270" y="22" width="138" height="30" rx="15" fill="#6B21D6"/>
  <text x="1339" y="42" font-family="'SF Pro Text', 'Inter', sans-serif" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.1">+ Report an Issue</text>

  <!-- Starburst / radial logo icon -->
  <g transform="translate(1408, 36)">
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(0)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(22.5)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(45)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(67.5)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(90)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(112.5)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(135)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(157.5)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(180)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(202.5)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(225)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(247.5)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(270)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(292.5)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(315)"/>
    <line x1="0" y1="-12" x2="0" y2="-5"  stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" transform="rotate(337.5)"/>
