    <line x1="0" y1="-14" x2="0" y2="-6"  stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" transform="rotate(67.5)"/>
    <line x1="0" y1="-14" x2="0" y2="-6"  stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" transform="rotate(90)"/>
    <line x1="0" y1="-14" x2="0" y2="-6"  stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" transform="rotate(112.5)"/>
    <line x1="0" y1="-14" x2="0" y2="-6"  stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" transform="rotate(135)"/>
